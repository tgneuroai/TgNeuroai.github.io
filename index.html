<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mfer · Alchemy NFT ডাউনলোডার</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ===== ভেরিয়েবল ===== */
        :root {
            --bg-color: #0b0b0b;
            --card-color: #151515;
            --accent-color: #D8FF00;
            --accent-hover: #b3cc00;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --danger-color: #ff3333;
            --success-color: #33ff33;
            --border-color: #252525;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== হেডার ===== */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .text-accent {
            color: var(--accent-color);
        }
        .text-danger {
            color: var(--danger-color);
        }
        .text-success {
            color: var(--success-color);
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* ===== কনফিগ প্যানেল ===== */
        .config-panel {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .input-group input,
        .input-group select {
            background-color: #202020;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(216, 255, 0, 0.2);
        }

        .input-group input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== বাটন ===== */
        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #000;
        }
        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-accent {
            background-color: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
        }
        .btn-accent:hover:not(:disabled) {
            background-color: var(--accent-color);
            color: #000;
        }
        .btn-accent:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }
        .btn-danger:hover {
            opacity: 0.9;
        }

        .action-row {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* ===== প্রগ্রেস প্যানেল ===== */
        .progress-panel {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .progress-bar-container {
            background-color: #202020;
            height: 12px;
            border-radius: 30px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--accent-color), #aacc00);
            height: 100%;
            width: 0%;
            transition: width 0.2s ease;
        }

        /* ===== সার্চ প্যানেল ===== */
        .filter-panel {
            margin-bottom: 30px;
        }

        .search-box {
            position: relative;
            max-width: 500px;
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            width: 100%;
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            padding: 14px 16px 14px 45px;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* ===== গ্যালারি গ্রিড ===== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        .nft-card {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .nft-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 12px 30px rgba(216, 255, 0, 0.1);
        }

        .nft-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 8px;
            background-color: #202020;
            overflow: hidden;
            cursor: pointer;
        }

        .nft-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nft-image-wrapper img.loaded {
            opacity: 1;
        }

        .card-meta {
            margin-top: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-id {
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-url-box {
            background-color: #202020;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 12px;
        }

        .btn-card-download {
            background-color: #252525;
            color: white;
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-card-download:hover {
            background-color: var(--accent-color);
            color: #000;
        }

        /* ===== মোডাল ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }

        .modal-content-wrapper {
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .modal-content {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .modal-caption {
            margin-top: 15px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-close:hover {
            color: var(--accent-color);
        }

        /* ===== ইউটিলিটি ===== */
        .hidden {
            display: none !important;
        }
        .sentinel {
            height: 20px;
            width: 100%;
            margin-top: 20px;
        }
        .text-center {
            text-align: center;
        }

        /* ===== রেসপন্সিভ ===== */
        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }
            header h1 {
                font-size: 2.2rem;
            }
            .config-panel {
                padding: 20px;
            }
            .action-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <section class="config-panel">

        <!-- প্রগ্রেস প্যানেল -->
        <section id="progressPanel" class="progress-panel hidden">

                <span>Progress: <strong id="progressPercent">0%</strong></span>
                <span>Current ID: <strong id="currentId">-</strong></span>

                <button id="retryBtn" class="btn btn-danger hidden">
                    <i class="fa-solid fa-rotate-right"></i> ফেইলড রিট্রাই
                </button>
            </div>
        </section>

        <!-- সার্চ প্যানেল -->
        <section id="filterPanel" class="filter-panel hidden">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchBar" placeholder="Token ID বা নাম দিয়ে খুঁজুন..." />
            </div>
        </section>

        <!-- গ্যালারি গ্রিড -->
        <main id="galleryGrid" class="gallery-grid"></main>

        <!-- ইনফিনিট স্ক্রল সেন্টিনেল -->
        <div id="sentinel" class="sentinel"></div>
    </div>

    <!-- মোডাল -->
    <div id="previewModal" class="modal">
        <span class="modal-close">&times;</span>
        <div class="modal-content-wrapper">
            <img class="modal-content" id="modalImg" />
            <div id="modalCaption" class="modal-caption"></div>
        </div>
    </div>

    <!-- JSZip এবং FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
    </script>

        // ============================================================
        //  স্টেট ম্যানেজমেন্ট
        // ============================================================
        let nftCollection = [];
        let displayedCount = 0;
        let failedTokens = [];
        const ITEMS_PER_PAGE = 20;

        // ============================================================
        //  DOM এলিমেন্ট
        // ============================================================
        const loadBtn = document.getElementById('loadBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const retryBtn = document.getElementById('retryBtn');
        const progressPanel = document.getElementById('progressPanel');
        const filterPanel = document.getElementById('filterPanel');
        const galleryGrid = document.getElementById('galleryGrid');
        const searchBar = document.getElementById('searchBar');
        const sentinel = document.getElementById('sentinel');

        const progressPercent = document.getElementById('progressPercent');
        const currentIdIndicator = document.getElementById('currentId');
        const loadedCountIndicator = document.getElementById('loadedCount');
        const failedCountIndicator = document.getElementById('failedCount');
        const progressBar = document.getElementById('progressBar');

        const modal = document.getElementById('previewModal');
        const modalImg = document.getElementById('modalImg');
        const modalCaption = document.getElementById('modalCaption');
        const modalClose = document.querySelector('.modal-close');

        // ============================================================
        //  লোড ফাংশন
        // ============================================================
        loadBtn.addEventListener('click', async () => {
            nftCollection = [];
            failedTokens = [];
            galleryGrid.innerHTML = '';
            displayedCount = 0;

            const apiKey = document.getElementById('apiKey').value.trim();
            const contract = document.getElementById('contractAddress').value.trim();
            const network = document.getElementById('network').value;

            if (!apiKey || !contract) {
                alert('API Key এবং Contract Address দিন!');
                return;
            }

            progressPanel.classList.remove('hidden');
            filterPanel.classList.add('hidden');
            downloadAllBtn.disabled = true;
            retryBtn.classList.add('hidden');

            await fetchAllNFTs(apiKey, contract, network);
        });

        // ============================================================
        //  সব NFT ফেচ
        // ============================================================
        async function fetchAllNFTs(apiKey, contract, network) {
            let loaded = 0;
            let failed = 0;
            const total = TOKEN_IDS.length;

            for (let i = 0; i < total; i++) {
                const tokenId = TOKEN_IDS[i];
                currentIdIndicator.textContent = tokenId;

                const endpoint =
                    `https://${network}.g.alchemy.com/nft/v3/${apiKey}/getNFTMetadata?contractAddress=${contract}&tokenId=${tokenId}&refreshCache=false`;

                try {
                    const response = await fetch(endpoint);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const metadata = await response.json();

                    let rawImageUrl = metadata.image?.cachedUrl || metadata.image?.originalUrl || metadata.raw?.metadata
                        ?.image;

                    if (!rawImageUrl && metadata.raw?.metadata?.image) {
                        rawImageUrl = metadata.raw.metadata.image;
                    }

                    if (rawImageUrl && rawImageUrl.startsWith('ipfs://')) {
                        rawImageUrl = rawImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/');
                    }

                    if (rawImageUrl) {
                        nftCollection.push({
                            tokenId: tokenId,
                            name: metadata.name || `mfer #${tokenId}`,
                            imageUrl: rawImageUrl,
                            downloadName: `${tokenId}.png`
                        });
                        loaded++;
                        loadedCountIndicator.textContent = loaded;
                    } else {
                        throw new Error('ইমেজ URL পাওয়া যায়নি');
                    }
                } catch (error) {
                    console.error(`#${tokenId} লোড ব্যর্থ:`, error);
                    failed++;
                    failedTokens.push(tokenId);
                    failedCountIndicator.textContent = failed;
                }

                const percent = Math.round(((loaded + failed) / total) * 100);
                progressBar.style.width = `${percent}%`;
                progressPercent.textContent = `${percent}%`;
            }

            if (nftCollection.length > 0) {
                downloadAllBtn.disabled = false;
                filterPanel.classList.remove('hidden');
                renderNextItems();
                setupInfiniteScroll();
            }

            if (failedTokens.length > 0) {
                retryBtn.classList.remove('hidden');
            }
        }

        // ============================================================
        //  রেন্ডারিং
        // ============================================================
        function renderNextItems(filteredList = null) {
            const list = filteredList || nftCollection;
            const targetLimit = Math.min(displayedCount + ITEMS_PER_PAGE, list.length);

            for (let i = displayedCount; i < targetLimit; i++) {
                const item = list[i];
                const card = document.createElement('div');
                card.className = 'nft-card';
                card.innerHTML = `
                        <div class="nft-image-wrapper" onclick="openImageModal('${item.imageUrl}', '${item.name}')">
                            <img data-src="${item.imageUrl}" alt="${item.name}" class="lazy-img">
                        </div>
                        <div class="card-meta">
                            <span class="card-id">ID: #${item.tokenId}</span>
                            <h3 class="card-name">${item.name}</h3>
                            <div class="card-url-box" title="${item.imageUrl}">${item.imageUrl.substring(0, 60)}...</div>
                            <button class="btn-card-download" onclick="downloadSingleAsset('${item.imageUrl}', '${item.downloadName}')">
                                <i class="fa-solid fa-download"></i> ডাউনলোড
                            </button>
                        </div>
                    `;
                galleryGrid.appendChild(card);
            }

            displayedCount = targetLimit;
            setupLazyLoading();
        }

        // ============================================================
        //  লেজি লোডিং
        // ============================================================
        function setupLazyLoading() {
            const lazyImages = document.querySelectorAll('.lazy-img:not(.loaded)');

            if ('IntersectionObserver' in window) {
                const imgObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            img.src = img.dataset.src;
                            img.onload = () => img.classList.add('loaded');
                            observer.unobserve(img);
                        }
                    });
                });

                lazyImages.forEach(img => imgObserver.observe(img));
            } else {
                lazyImages.forEach(img => {
                    img.src = img.dataset.src;
                    img.classList.add('loaded');
                });
            }
        }

        // ============================================================
        //  ইনফিনিট স্ক্রল
        // ============================================================
        function setupInfiniteScroll() {
            const scrollObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && displayedCount < nftCollection.length && !searchBar.value.trim()) {
                    renderNextItems();
                }
            }, { rootMargin: '200px' });

            scrollObserver.observe(sentinel);
        }

        // ============================================================
        //  সার্চ
        // ============================================================
        searchBar.addEventListener('input', () => {
            const query = searchBar.value.toLowerCase().trim();
            galleryGrid.innerHTML = '';
            displayedCount = 0;

            if (!query) {
                renderNextItems();
                return;
            }

            const filtered = nftCollection.filter(item =>
                item.tokenId.toString().includes(query) ||
                item.name.toLowerCase().includes(query)
            );

            renderNextItems(filtered);
        });

        // ============================================================
        //  ডাউনলোড
        // ============================================================
        async function downloadSingleAsset(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                saveAs(blob, filename);
            } catch (e) {
                alert('ডাউনলোড ব্যর্থ। লিংকটি ম্যানুয়ালি খুলুন।');
            }
        }

        downloadAllBtn.addEventListener('click', async () => {
            const folderName = document.getElementById('folderName').value.trim() || 'mfers';
            downloadAllBtn.disabled = true;
            downloadAllBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> জিপ তৈরি হচ্ছে...`;

            const zip = new JSZip();
            const imgFolder = zip.folder(folderName);

            for (let i = 0; i < nftCollection.length; i++) {
                const item = nftCollection[i];
                try {
                    const imgResponse = await fetch(item.imageUrl);
                    const blob = await imgResponse.blob();
                    imgFolder.file(item.downloadName, blob);
                } catch (err) {
                    console.error(`#${item.tokenId} জিপে যোগ করতে ব্যর্থ:`, err);
                }
            }

            zip.generateAsync({ type: 'blob' }).then(function(content) {
                saveAs(content, `${folderName}.zip`);
                downloadAllBtn.disabled = false;
                downloadAllBtn.innerHTML = `<i class="fa-solid fa-file-zipper"></i> সব ছবি জিপে ডাউনলোড`;
            }).catch(err => {
                alert('জিপ তৈরি ব্যর্থ।');
                downloadAllBtn.disabled = false;
            });
        });

        // ============================================================
        //  রিট্রাই
        // ============================================================
        retryBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const contract = document.getElementById('contractAddress').value.trim();
            const network = document.getElementById('network').value;

            const targetsToRetry = [...failedTokens];
            failedTokens = [];
            retryBtn.classList.add('hidden');

            for (let tokenId of targetsToRetry) {
                const endpoint =
                    `https://${network}.g.alchemy.com/nft/v3/${apiKey}/getNFTMetadata?contractAddress=${contract}&tokenId=${tokenId}&refreshCache=true`;
                try {
                    const response = await fetch(endpoint);
                    if (!response.ok) throw new Error();
                    const metadata = await response.json();
                    let rawImageUrl = metadata.image?.cachedUrl || metadata.image?.originalUrl || metadata.raw?.metadata
                        ?.image;

                    if (rawImageUrl && rawImageUrl.startsWith('ipfs://')) {
                        rawImageUrl = rawImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/');
                    }

                    if (rawImageUrl) {
                        nftCollection.push({
                            tokenId: tokenId,
                            name: metadata.name || `mfer #${tokenId}`,
                            imageUrl: rawImageUrl,
                            downloadName: `${tokenId}.png`
                        });
                        nftCollection.sort((a, b) => a.tokenId - b.tokenId);
                    } else {
                        throw new Error();
                    }
                } catch (e) {
                    failedTokens.push(tokenId);
                }
            }

            galleryGrid.innerHTML = '';
            displayedCount = 0;
            renderNextItems();

            loadedCountIndicator.textContent = nftCollection.length;
            failedCountIndicator.textContent = failedTokens.length;
            if (failedTokens.length > 0) retryBtn.classList.remove('hidden');
        });

        // ============================================================
        //  মোডাল
        // ============================================================
        function openImageModal(src, caption) {
            modal.style.display = 'flex';
            modalImg.src = src;
            modalCaption.textContent = caption;
        }

        modalClose.addEventListener('click', () => modal.style.display = 'none');
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });

        // ============================================================
        //  পেজ লোডে ইনফো
        // ============================================================
        console.log(`🔥 ${TOKEN_IDS.length} টি Token ID লোডের জন্য প্রস্তুত`);
    </script>

</body>
</html>
