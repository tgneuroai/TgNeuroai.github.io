<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Normis · 1-Bit GameBoy Ultra Batch Converter</title>
    <!-- JSZip CDN ফাইল এক্সেস এবং ফিউচারিস্টিক ইন্টারফেসের জন্য স্টাইল -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-dark: #070a13;
            --panel-bg: rgba(17, 25, 40, 0.75);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-green: #00ff66;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            background-image: radial-gradient(at 50% 0%, rgba(0, 255, 102, 0.07) 0px, transparent 50%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 3rem 1.5rem;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(to right, #00ff66, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .upload-zone {
            border: 2px dashed rgba(0, 255, 102, 0.3);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-zone:hover {
            border-color: var(--accent-green);
            background: rgba(0, 255, 102, 0.03);
        }
        .upload-zone p { color: var(--text-muted); font-size: 1.1rem; }
        .upload-zone strong { color: var(--accent-green); }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group select, .input-group input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, #00ff66 0%, #00b347 100%);
            color: #070a13;
            border: none;
            padding: 1.2rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 255, 102, 0.2);
            display: none;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 255, 102, 0.4);
        }

        .status-box {
            display: none;
            margin-top: 1.5rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
        }

        .progress-bar-bg {
            background: rgba(255, 255, 255, 0.05);
            height: 8px;
            border-radius: 100px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-bar-fill {
            background: var(--accent-green);
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .log {
            font-family: monospace;
            font-size: 0.85rem;
            color: #60a5fa;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📟 পিওর মনোক্রোম পিক্সেল ফ্যাক্টরি</h1>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">১ থেকে ৯৯৯৯+ বাল্ক ইমেজ জিপ প্রসেসর</p>
    </div>

    <!-- কন্ট্রোল সেটিংস -->
    <div class="controls">
        <div class="input-group">
            <label>টার্গেট পিক্সেল সাইজ (হুবহু সেম গ্রিড)</label>
            <select id="pixelSize">
                <option value="32" selected>32 x 32 পিক্সেল (স্ক্রিনশটের সাইজ)</option>
                <option value="48">48 x 48 পিক্সেল</option>
                <option value="64">64 x 64 পিক্সেল</option>
                <option value="128">128 x 128 পিক্সেল</option>
            </select>
        </div>
        <div class="input-group">
            <label>ব্ল্যাক/হোয়াইট থ্রেশহোল্ড (কন্ট্রাস্ট)</label>
            <input type="range" id="threshold" min="50" max="200" value="128">
        </div>
    </div>

    <!-- ফাইল ড্রপ এরিয়া -->
    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" multiple accept="image/*">
        <p>📂 একসাথে তোমার সব ছবি (১-৯৯৯৯+) এখানে <strong>ড্র্যাগ করো</strong> অথবা <strong>সিলেক্ট করো</strong></p>
        <span id="fileCount" style="display:block; margin-top: 10px; color: #00ff66; font-weight: bold;"></span>
    </div>

    <!-- অ্যাকশন বাটন -->
    <button class="btn-action" id="processBtn">⚡ পিক্সেল কনভার্ট এবং জিপ ডাউনলোড করো</button>

    <!-- স্ট্যাটাস ও প্রোগ্রেস ট্র্যাকার -->
    <div class="status-box" id="statusBox">
        <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
            <span id="statusText">রেডি...</span>
            <span id="statusPercent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="log" id="logBox"></div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const processBtn = document.getElementById('processBtn');
    const statusBox = document.getElementById('statusBox');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const statusPercent = document.getElementById('statusPercent');
    const logBox = document.getElementById('logBox');

    let uploadedFiles = [];

    // ড্রপ জোন ইভেন্ট হ্যান্ডলার
    fileInput.addEventListener('change', handleFilesSelect);
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#00ff66'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'rgba(0, 255, 102, 0.3)'; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            handleFilesSelect();
        }
    });

    function handleFilesSelect() {
        uploadedFiles = Array.from(fileInput.files);
        if (uploadedFiles.length > 0) {
            document.getElementById('fileCount').textContent = `✓ ${uploadedFiles.length} টি ছবি আপলোড করা হয়েছে।`;
            processBtn.style.display = 'block';
        }
    }

    // মেইন প্রসেসিং ইঞ্জিন
    processBtn.addEventListener('click', async () => {
        if (uploadedFiles.length === 0) return;

        processBtn.disabled = true;
        statusBox.style.display = 'block';
        logBox.innerHTML = '';
        
        const zip = new JSZip();
        const targetRes = parseInt(document.getElementById('pixelSize').value);
        const thresholdVal = parseInt(document.getElementById('threshold').value);

        // অফস্ক্রিন ক্যানভাস (স্পিড বুস্ট করার জন্য মেমোরিতে রেন্ডার হবে)
        const canvas = document.createElement('canvas');
        canvas.width = targetRes;
        canvas.height = targetRes;
        const ctx = canvas.getContext('2d');

        const total = uploadedFiles.length;

        for (let i = 0; i < total; i++) {
            const file = uploadedFiles[i];
            statusText.textContent = `প্রসেস করা হচ্ছে: ${file.name} (${i + 1}/${total})`;
            const percent = Math.round(((i + 1) / total) * 100);
            progressBar.style.width = `${percent}%`;
            statusPercent.textContent = `${percent}%`;

            try {
                // ইমেজ ডেটা রিড ও পিক্সেল জেনারেশন
                const img = await loadImage(file);
                ctx.clearRect(0, 0, targetRes, targetRes);
                ctx.imageSmoothingEnabled = false; // পিক্সেল শার্পনেস ১০০% রাখার জন্য ব্লাড ইফেক্ট অফ
                ctx.drawImage(img, 0, 0, targetRes, targetRes);

                const imgData = ctx.getImageData(0, 0, targetRes, targetRes);
                const data = imgData.data;

                // ১০০% ক্লিয়ার গেমবয় 1-Bit সলিড ব্ল্যাক/হোয়াইট ক্যালকুলেশন
                for (let j = 0; j < data.length; j += 4) {
                    let a = data[j+3];
                    if (a < 50) {
                        // যদি ব্যাকগ্রাউন্ড ট্রান্সপারেন্ট হয়, তবে ব্যাকগ্রাউন্ড পিওর সাদা করে দেওয়া হবে
                        data[j] = 245; data[j+1] = 245; data[j+2] = 245; data[j+3] = 255;
                        continue;
                    }
                    
                    let gray = 0.299 * data[j] + 0.587 * data[j+1] + 0.114 * data[j+2];
                    
                    // হুবহু স্ক্রিনশটের মতো হার্ড-কাটআউট (No intermediate shades)
                    let finalColor = gray > thresholdVal ? 245 : 15; 
                    data[j] = data[j+1] = data[j+2] = finalColor;
                }

                ctx.putImageData(imgData, 0, 0);

                // ক্যানভাস ব্লব ডেটা তৈরি করে জিপে পুশ
                const blob = await getCanvasBlob(canvas);
                zip.file(`pixel_${file.name.split('.')[0]}.png`, blob);
                
                logBox.innerHTML += `✓ জেনারেট হয়েছে: ${file.name}<br>`;
                logBox.scrollTop = logBox.scrollHeight;

            } catch (err) {
                logBox.innerHTML += `<span style="color: #ff3333;">✕ ত্রুটি (${file.name}): ${err.message}</span><br>`;
            }
        }

        // জিপ ফাইল কম্প্রেস এবং অটো-ডাউনলোড
        statusText.textContent = `📦 জিপ প্যাকেজ তৈরি হচ্ছে... অনুগ্রহ করে অপেক্ষা করুন...`;
        const content = await zip.generateAsync({ type: "blob" });
        
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `GameBoy_Monochrome_Pixels.zip`;
        link.click();

        statusText.textContent = `🎉 জিপ ফাইল ডাউনলোড সম্পন্ন হয়েছে!`;
        processBtn.disabled = false;
    });

    // হেল্পার ফাংশন সমূহ
    function loadImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error("ইমেজ ফাইলটি রিড করা যায়নি।"));
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function getCanvasBlob(canvas) {
        return new Promise((resolve) => {
            canvas.toBlob((blob) => resolve(blob), 'image/png');
        });
    }
</script>
</body>
</html>
