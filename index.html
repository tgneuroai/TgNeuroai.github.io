<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mfer · Alchemy NFT ডাউনলোডার</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ===== ভেরিয়েবল ===== */
        :root {
            --bg-color: #0b0b0b;
            --card-color: #151515;
            --accent-color: #D8FF00;
            --accent-hover: #b3cc00;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --danger-color: #ff3333;
            --success-color: #33ff33;
            --border-color: #252525;
            --warning-color: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== হেডার ===== */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .text-accent {
            color: var(--accent-color);
        }
        .text-danger {
            color: var(--danger-color);
        }
        .text-success {
            color: var(--success-color);
        }
        .text-warning {
            color: var(--warning-color);
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* ===== কনফিগ প্যানেল ===== */
        .config-panel {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .input-group input,
        .input-group select {
            background-color: #202020;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(216, 255, 0, 0.2);
        }

        .input-group input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== বাটন ===== */
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #000;
            width: 100%;
        }
        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-accent {
            background-color: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
        }
        .btn-accent:hover:not(:disabled) {
            background-color: var(--accent-color);
            color: #000;
        }
        .btn-accent:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }
        .btn-danger:hover {
            opacity: 0.9;
        }

        .btn-success {
            background-color: var(--success-color);
            color: #000;
        }
        .btn-success:hover {
            opacity: 0.9;
        }

        .action-row {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* ===== প্রগ্রেস প্যানেল ===== */
        .progress-panel {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .progress-stats .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .progress-stats .stat-item .icon {
            font-size: 1rem;
        }

        .progress-bar-container {
            background-color: #202020;
            height: 12px;
            border-radius: 30px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--accent-color), #aacc00);
            height: 100%;
            width: 0%;
            transition: width 0.2s ease;
        }

        /* ===== লাইভ লগ ===== */
        .live-log {
            background-color: #111;
            border: 1px solid #252525;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 15px;
            max-height: 120px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #aaa;
        }

        .live-log .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .live-log .log-entry.success {
            color: var(--success-color);
        }
        .live-log .log-entry.error {
            color: var(--danger-color);
        }
        .live-log .log-entry.loading {
            color: var(--warning-color);
        }
        .live-log .log-entry.info {
            color: var(--text-muted);
        }

        /* ===== সার্চ প্যানেল ===== */
        .filter-panel {
            margin-bottom: 30px;
        }

        .search-box {
            position: relative;
            max-width: 500px;
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            width: 100%;
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            padding: 14px 16px 14px 45px;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* ===== গ্যালারি গ্রিড ===== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        .nft-card {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .nft-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 12px 30px rgba(216, 255, 0, 0.1);
        }

        .nft-card .status-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
            z-index: 2;
        }

        .nft-card .status-badge.success {
            background: var(--success-color);
            color: #000;
        }

        .nft-card .status-badge.error {
            background: var(--danger-color);
            color: #fff;
        }

        .nft-card .status-badge.loading {
            background: var(--warning-color);
            color: #000;
        }

        .nft-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 8px;
            background-color: #202020;
            overflow: hidden;
            cursor: pointer;
        }

        .nft-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nft-image-wrapper img.loaded {
            opacity: 1;
        }

        .card-meta {
            margin-top: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-id {
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-status-text {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .card-status-text .status-success {
            color: var(--success-color);
        }
        .card-status-text .status-error {
            color: var(--danger-color);
        }
        .card-status-text .status-loading {
            color: var(--warning-color);
        }

        .btn-card-download {
            background-color: #252525;
            color: white;
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-card-download:hover:not(:disabled) {
            background-color: var(--accent-color);
            color: #000;
        }
        .btn-card-download:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== মোডাল ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }

        .modal-content-wrapper {
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .modal-content {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .modal-caption {
            margin-top: 15px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-close:hover {
            color: var(--accent-color);
        }

        /* ===== ইউটিলিটি ===== */
        .hidden {
            display: none !important;
        }
        .sentinel {
            height: 20px;
            width: 100%;
            margin-top: 20px;
        }
        .text-center {
            text-align: center;
        }

        /* ===== স্ক্রলবার ===== */
        .live-log::-webkit-scrollbar,
        .log-container::-webkit-scrollbar {
            width: 6px;
        }

        .live-log::-webkit-scrollbar-track,
        .log-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .live-log::-webkit-scrollbar-thumb,
        .log-container::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
        }

        /* ===== রেসপন্সিভ ===== */
        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }
            header h1 {
                font-size: 2.2rem;
            }
            .config-panel {
                padding: 20px;
            }
            .action-row {
                flex-direction: column;
            }
        }
    </style>
</head>

            <button id="loadBtn" class="btn btn-primary"><i class="fa-solid fa-cloud-arrow-down"></i> লোড শুরু (Alchemy API)</button>

        <section id="progressPanel" class="progress-panel hidden">

            <div class="progress-bar-container">

        <!-- গ্যালারি গ্রিড -->
        <main id="galleryGrid" class="gallery-grid"></main>

        <!-- ইনফিনিট স্ক্রল সেন্টিনেল -->
        <div id="sentinel" class="sentinel"></div>
    </div>

        const loadedCountIndicator = document.getElementById('loadedCount');
        const failedCountIndicator = document.getElementById('failedCount');
        const progressBar = document.getElementById('progressBar');
        const timeElapsed = document.getElementById('timeElapsed');
        const liveLog = document.getElementById('liveLog');

        const modal = document.getElementById('previewModal');
        const modalImg = document.getElementById('modalImg');
        const modalCaption = document.getElementById('modalCaption');
        const modalClose = document.querySelector('.modal-close');

        // ============================================================
        //  লাইভ লগ ফাংশন
        // ============================================================
        function addLog(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.textContent = message;
            liveLog.appendChild(div);
            liveLog.scrollTop = liveLog.scrollHeight;
        }

        // ============================================================
        //  টাইমার
        // ============================================================
        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const secs = String(elapsed % 60).padStart(2, '0');
                timeElapsed.textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        // ============================================================
        //  লোড ফাংশন (শুধু Alchemy API, IPFS নয়)
        // ============================================================
        loadBtn.addEventListener('click', async () => {
            if (isProcessing) return;

            nftCollection = [];
            failedTokens = [];
            galleryGrid.innerHTML = '';
            displayedCount = 0;
            liveLog.innerHTML = '';
            isProcessing = true;

            const apiKey = document.getElementById('apiKey').value.trim();
            const contract = document.getElementById('contractAddress').value.trim();
            const network = document.getElementById('network').value;

            if (!apiKey || !contract) {
                alert('API Key এবং Contract Address দিন!');
                isProcessing = false;
                return;
            }

            progressPanel.classList.remove('hidden');
            filterPanel.classList.add('hidden');
            downloadAllBtn.disabled = true;
            retryBtn.classList.add('hidden');
            startTimer();

            addLog('🚀 Alchemy API থেকে লোড শুরু হচ্ছে...', 'info');
            addLog(`📊 মোট ${TOKEN_IDS.length} টি NFT`, 'info');

            await fetchAllNFTs(apiKey, contract, network);
            isProcessing = false;
        });

        // ============================================================
        //  সব NFT ফেচ (শুধু Alchemy API)
        // ============================================================
        async function fetchAllNFTs(apiKey, contract, network) {
            let loaded = 0;
            let failed = 0;
            const total = TOKEN_IDS.length;

            for (let i = 0; i < total; i++) {
                const tokenId = TOKEN_IDS[i];
                currentIdIndicator.textContent = tokenId;

                // Alchemy NFT API v3 endpoint (শুধু এখান থেকে ডেটা নেওয়া হচ্ছে)
                const endpoint =
                    `https://${network}.g.alchemy.com/nft/v3/${apiKey}/getNFTMetadata?contractAddress=${contract}&tokenId=${tokenId}&refreshCache=false`;

                try {
                    addLog(`⏳ #${tokenId} লোড হচ্ছে...`, 'loading');

                    const response = await fetch(endpoint);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const metadata = await response.json();

                    // 🔥 ইমেজ URL বের করা (শুধু Alchemy থেকে, IPFS নয়)
                    let rawImageUrl = null;

                    // Alchemy এর cachedUrl বা originalUrl ব্যবহার
                    if (metadata.image?.cachedUrl) {
                        rawImageUrl = metadata.image.cachedUrl;
                    } else if (metadata.image?.originalUrl) {
                        rawImageUrl = metadata.image.originalUrl;
                    } else if (metadata.raw?.metadata?.image) {
                        rawImageUrl = metadata.raw.metadata.image;
                    }

                    // ⛔ IPFS URL বাদ দেওয়া হচ্ছে (শুধু HTTP/HTTPS CDN URL নেওয়া হবে)
                    if (rawImageUrl && rawImageUrl.startsWith('ipfs://')) {
                        addLog(`⚠️ #${tokenId}: IPFS URL বাদ দেওয়া হচ্ছে (Alchemy CDN থেকে লোড করুন)`, 'error');
                        rawImageUrl = null;
                    }

                    // Alchemy CDN URL ফরম্যাটে কনভার্ট (যদি IPFS হয়)
                    if (!rawImageUrl && metadata.raw?.metadata?.image) {
                        const ipfsPath = metadata.raw.metadata.image;
                        if (ipfsPath && ipfsPath.startsWith('ipfs://')) {
                            const cid = ipfsPath.replace('ipfs://', '');
                            // Alchemy CDN ব্যবহার (IPFS গেটওয়ে নয়)
                            rawImageUrl =
                            `https://nft-cdn.alchemy.com/ipfs/${cid}`;
                        }
                    }

                    // শেষ চেষ্টা: Alchemy এর media gateway
                    if (!rawImageUrl && metadata.media && metadata.media.length > 0) {
                        for (const media of metadata.media) {
                            if (media.gateway && !media.gateway.includes('ipfs.io')) {
                                rawImageUrl = media.gateway;
                                break;
                            }
                        }
                    }

                    if (rawImageUrl) {
                        nftCollection.push({
                            tokenId: tokenId,
                            name: metadata.name || `mfer #${tokenId}`,
                            imageUrl: rawImageUrl,
                            downloadName: `${tokenId}.png`,
                            status: 'loaded'
                        });
                        loaded++;
                        loadedCountIndicator.textContent = loaded;
                        addLog(`✅ #${tokenId}: সফল (CDN)`, 'success');
                    } else {
                        throw new Error('কোনো CDN URL পাওয়া যায়নি');
                    }

                } catch (error) {
                    console.error(`#${tokenId} লোড ব্যর্থ:`, error);
                    failed++;
                    failedTokens.push(tokenId);
                    failedCountIndicator.textContent = failed;
                    addLog(`❌ #${tokenId}: ${error.message}`, 'error');
                }

                // প্রগ্রেস আপডেট
                const percent = Math.round(((loaded + failed) / total) * 100);
                progressBar.style.width = `${percent}%`;
                progressPercent.textContent = `${percent}%`;
            }

            stopTimer();

            if (nftCollection.length > 0) {
                downloadAllBtn.disabled = false;
                filterPanel.classList.remove('hidden');
                renderNextItems();
                setupInfiniteScroll();
                addLog(`✅ মোট ${nftCollection.length} টি NFT সফলভাবে লোড হয়েছে`, 'success');
            } else {
                addLog('❌ কোনো NFT লোড হয়নি!', 'error');
            }

            if (failedTokens.length > 0) {
                retryBtn.classList.remove('hidden');
                addLog(`⚠️ ${failedTokens.length} টি NFT ফেইল হয়েছে`, 'error');
            }

            addLog(`⏱️ সময় লেগেছে: ${timeElapsed.textContent}`, 'info');
        }

        // ============================================================
        //  রেন্ডারিং
        // ============================================================
        function renderNextItems(filteredList = null) {
            const list = filteredList || nftCollection;
            const targetLimit = Math.min(displayedCount + ITEMS_PER_PAGE, list.length);

            for (let i = displayedCount; i < targetLimit; i++) {
                const item = list[i];
                const card = document.createElement('div');
                card.className = 'nft-card';
                card.dataset.tokenId = item.tokenId;

                const statusBadge = item.status === 'loaded' ? 'success' : 'error';
                const statusText = item.status === 'loaded' ? '✅ লোড হয়েছে' : '❌ ব্যর্থ';

                card.innerHTML = `
                        <div class="nft-image-wrapper" onclick="openImageModal('${item.imageUrl}', '${item.name}')">
                            <span class="status-badge ${statusBadge}">${statusText}</span>
                            <img data-src="${item.imageUrl}" alt="${item.name}" class="lazy-img">
                        </div>
                        <div class="card-meta">
                            <span class="card-id">ID: #${item.tokenId}</span>
                            <h3 class="card-name">${item.name}</h3>
                            <div class="card-url-box" title="${item.imageUrl}">${item.imageUrl.substring(0, 60)}...</div>
                            <button class="btn-card-download" onclick="downloadSingleAsset('${item.imageUrl}', '${item.downloadName}')">
                                <i class="fa-solid fa-download"></i> ডাউনলোড
                            </button>
                        </div>
                    `;
                galleryGrid.appendChild(card);
            }

            displayedCount = targetLimit;
            setupLazyLoading();
        }

        // ============================================================
        //  লেজি লোডিং
        // ============================================================
        function setupLazyLoading() {
            const lazyImages = document.querySelectorAll('.lazy-img:not(.loaded)');

            if ('IntersectionObserver' in window) {
                const imgObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            img.src = img.dataset.src;
                            img.onload = () => img.classList.add('loaded');
                            imgObserver.unobserve(img);
                        }
                    });
                });

                lazyImages.forEach(img => imgObserver.observe(img));
            } else {
                lazyImages.forEach(img => {
                    img.src = img.dataset.src;
                    img.classList.add('loaded');
                });
            }
        }

        // ============================================================
        //  ইনফিনিট স্ক্রল
        // ============================================================
        function setupInfiniteScroll() {
            const scrollObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && displayedCount < nftCollection.length && !searchBar.value.trim()) {
                    renderNextItems();
                }
            }, { rootMargin: '200px' });

            scrollObserver.observe(sentinel);
        }

        // ============================================================
        //  সার্চ
        // ============================================================
        searchBar.addEventListener('input', () => {
            const query = searchBar.value.toLowerCase().trim();
            galleryGrid.innerHTML = '';
            displayedCount = 0;

            if (!query) {
                renderNextItems();
                return;
            }

            const filtered = nftCollection.filter(item =>
                item.tokenId.toString().includes(query) ||
                item.name.toLowerCase().includes(query)
            );

            renderNextItems(filtered);
        });

        // ============================================================
        //  🔥 ডাউনলোড সিস্টেম (CORS-মুক্ত)
        // ============================================================

        // ----- ১. একক ডাউনলোড (CORS-মুক্ত) -----
        function downloadSingleAsset(url, filename) {
            // <a download> ব্যবহার করলে CORS ব্লক করে না
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ----- ২. জিপ ডাউনলোড (প্রোক্সি ব্যবহার) -----
        downloadAllBtn.addEventListener('click', async () => {
            const folderName = document.getElementById('folderName').value.trim() || 'mfers';

            if (nftCollection.length === 0) {
                alert('কোনো ছবি লোড হয়নি। প্রথমে লোড করুন।');
                return;
            }

            downloadAllBtn.disabled = true;
            downloadAllBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> জিপ তৈরি হচ্ছে...`;

            try {
                const zip = new JSZip();
                const imgFolder = zip.folder(folderName);

                let successCount = 0;
                let failCount = 0;

                for (let i = 0; i < nftCollection.length; i++) {
                    const item = nftCollection[i];
                    try {
                        // CORS এড়ানোর জন্য প্রোক্সি ব্যবহার
                        const proxyUrl =
                            `https://api.allorigins.win/raw?url=${encodeURIComponent(item.imageUrl)}`;
                        const response = await fetch(proxyUrl);

                        if (!response.ok) throw new Error(`HTTP ${response.status}`);

                        const blob = await response.blob();
                        imgFolder.file(item.downloadName, blob);
                        successCount++;
                    } catch (err) {
                        console.error(`#${item.tokenId} জিপে যোগ করতে ব্যর্থ:`, err);
                        failCount++;

                        // ব্যাকআপ: সরাসরি লিংক ব্যবহার
                        try {
                            const directResponse = await fetch(item.imageUrl);
                            if (directResponse.ok) {
                                const blob = await directResponse.blob();
                                imgFolder.file(item.downloadName, blob);
                                successCount++;
                                failCount--;
                            }
                        } catch (e2) {
                            // ব্যর্থ হলে স্কিপ
                        }
                    }

                    // প্রগ্রেস আপডেট
                    const percent = Math.round(((i + 1) / nftCollection.length) * 100);
                    downloadAllBtn.innerHTML =
                        `<i class="fa-solid fa-spinner fa-spin"></i> ${percent}% (${i+1}/${nftCollection.length})`;
                }

                // জিপ জেনারেট ও ডাউনলোড
                const content = await zip.generateAsync({ type: 'blob' });
                saveAs(content, `${folderName}.zip`);

                downloadAllBtn.innerHTML =
                    `<i class="fa-solid fa-check-circle"></i> ✅ সম্পন্ন! (সফল: ${successCount}, ফেইল: ${failCount})`;
                setTimeout(() => {
                    downloadAllBtn.innerHTML = `<i class="fa-solid fa-file-zipper"></i> সব ছবি জিপে ডাউনলোড`;
                    downloadAllBtn.disabled = false;
                }, 3000);

            } catch (error) {
                console.error('জিপ তৈরি ব্যর্থ:', error);
                alert('জিপ তৈরি করতে সমস্যা হয়েছে। নেটওয়ার্ক চেক করে আবার চেষ্টা করুন।');
                downloadAllBtn.disabled = false;
                downloadAllBtn.innerHTML = `<i class="fa-solid fa-file-zipper"></i> সব ছবি জিপে ডাউনলোড`;
            }
        });

        // ============================================================
        //  রিট্রাই (ফেইলড Token ID গুলো আবার চেষ্টা)
        // ============================================================
        retryBtn.addEventListener('click', async () => {
            if (isProcessing) return;
            isProcessing = true;

            const apiKey = document.getElementById('apiKey').value.trim();
            const contract = document.getElementById('contractAddress').value.trim();
            const network = document.getElementById('network').value;

            const targetsToRetry = [...failedTokens];
            failedTokens = [];
            retryBtn.classList.add('hidden');

            addLog(`🔄 ${targetsToRetry.length} টি ফেইলড NFT রিট্রাই করা হচ্ছে...`, 'info');

            for (let tokenId of targetsToRetry) {
                const endpoint =
                    `https://${network}.g.alchemy.com/nft/v3/${apiKey}/getNFTMetadata?contractAddress=${contract}&tokenId=${tokenId}&refreshCache=true`;
                try {
                    addLog(`⏳ #${tokenId} রিট্রাই...`, 'loading');

                    const response = await fetch(endpoint);
                    if (!response.ok) throw new Error();

                    const metadata = await response.json();

                    let rawImageUrl = null;

                    if (metadata.image?.cachedUrl) {
                        rawImageUrl = metadata.image.cachedUrl;
                    } else if (metadata.image?.originalUrl) {
                        rawImageUrl = metadata.image.originalUrl;
                    } else if (metadata.raw?.metadata?.image) {
                        rawImageUrl = metadata.raw.metadata.image;
                    }

                    if (rawImageUrl && rawImageUrl.startsWith('ipfs://')) {
                        const cid = rawImageUrl.replace('ipfs://', '');
                        rawImageUrl = `https://nft-cdn.alchemy.com/ipfs/${cid}`;
                    }

                    if (!rawImageUrl && metadata.raw?.metadata?.image) {
                        const ipfsPath = metadata.raw.metadata.image;
                        if (ipfsPath && ipfsPath.startsWith('ipfs://')) {
                            const cid = ipfsPath.replace('ipfs://', '');
                            rawImageUrl = `https://nft-cdn.alchemy.com/ipfs/${cid}`;
                        }
                    }

                    if (!rawImageUrl && metadata.media && metadata.media.length > 0) {
                        for (const media of metadata.media) {
                            if (media.gateway && !media.gateway.includes('ipfs.io')) {
                                rawImageUrl = media.gateway;
                                break;
                            }
                        }
                    }

                    if (rawImageUrl) {
                        nftCollection.push({
                            tokenId: tokenId,
                            name: metadata.name || `mfer #${tokenId}`,
                            imageUrl: rawImageUrl,
                            downloadName: `${tokenId}.png`,
                            status: 'loaded'
                        });
                        nftCollection.sort((a, b) => a.tokenId - b.tokenId);
                        addLog(`✅ #${tokenId}: রিট্রাই সফল`, 'success');
                    } else {
                        throw new Error('CDN URL পাওয়া যায়নি');
                    }
                } catch (e) {
                    failedTokens.push(tokenId);
                    addLog(`❌ #${tokenId}: রিট্রাই ব্যর্থ`, 'error');
                }
            }

            // UI রিফ্রেশ
            galleryGrid.innerHTML = '';
            displayedCount = 0;
            renderNextItems();

            loadedCountIndicator.textContent = nftCollection.length;
            failedCountIndicator.textContent = failedTokens.length;
            if (failedTokens.length > 0) retryBtn.classList.remove('hidden');

            addLog(`✅ রিট্রাই সম্পন্ন! সফল: ${targetsToRetry.length - failedTokens.length}, ফেইল: ${failedTokens.length}`,
                'success');
            isProcessing = false;
        });

        // ============================================================
        //  মোডাল
        // ============================================================
        function openImageModal(src, caption) {
            modal.style.display = 'flex';
            modalImg.src = src;
            modalCaption.textContent = caption;
        }

        modalClose.addEventListener('click', () => modal.style.display = 'none');
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });

        // ============================================================
        //  পেজ লোডে ইনফো
        // ============================================================
        console.log(`🔥 ${TOKEN_IDS.length} টি Token ID Alchemy API থেকে লোডের জন্য প্রস্তুত`);
        console.log('📁 ফাইলের নাম হবে: TOKEN_ID.png (যেমন: 465.png)');
        console.log('✅ IPFS বাদ, শুধু Alchemy API + CDN');
    </script>

</body>
