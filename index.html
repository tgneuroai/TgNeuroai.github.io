<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risograph NFT Gallery | Sequential 1-10000</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a12; }
    .mono { font-family: 'Space Mono', monospace; }
    
    .riso-effect {
      position: relative;
    }
    .riso-effect::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(45deg, rgba(255,80,90,0.12) 0px, rgba(255,80,90,0.12) 2px, transparent 2px, transparent 6px),
                  repeating-linear-gradient(135deg, rgba(0,140,255,0.08) 0px, rgba(0,140,255,0.08) 3px, transparent 3px, transparent 8px);
      pointer-events: none;
      mix-blend-mode: overlay;
      border-radius: inherit;
    }
    
    .grain-overlay {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
    }
    
    .card {
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .card:hover {
      transform: translateY(-6px);
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-in {
      animation: fadeInUp 0.4s ease forwards;
    }
    
    .modal-open {
      animation: modalFade 0.2s ease;
    }
    
    @keyframes modalFade {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .image-toggle-btn {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.2s;
    }
    .image-toggle-btn:hover {
      background: #ff5a5f;
      border-color: white;
    }
    
    .scrollbar-custom::-webkit-scrollbar { width: 5px; }
    .scrollbar-custom::-webkit-scrollbar-track { background: #1a1a2a; }
    .scrollbar-custom::-webkit-scrollbar-thumb { background: #ff5a5f; border-radius: 10px; }
    
    .download-btn {
      background: linear-gradient(135deg, #ff5a5f, #ff2a2f);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .download-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 10px rgba(255,90,95,0.5);
    }
    .download-btn:active {
      transform: scale(0.98);
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .loading-pulse {
      animation: pulse 1s ease-in-out infinite;
    }
  </style>
</head>
<body class="scrollbar-custom overflow-x-hidden">
  <div class="fixed inset-0 grain-overlay pointer-events-none z-0"></div>
  
  <div id="app" class="relative z-10 min-h-screen">
    <!-- Header -->
    <header class="sticky top-0 z-30 backdrop-blur-xl bg-[#0a0a12]/90 border-b border-white/10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex flex-wrap items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <div class="w-1 h-6 bg-[#ff5a5f] rounded-full"></div>
          <div>
            <h1 id="main-title" class="mono text-xl sm:text-2xl font-bold bg-gradient-to-r from-[#ff6a6f] to-[#ff5a5f] bg-clip-text text-transparent">RISOGRAPH NFT</h1>
            <p id="subtitle" class="text-xs text-gray-400">sequential archive · 1 to 10,000</p>
          </div>
        </div>
        
        <div class="flex items-center gap-3">
          <!-- DOWNLOAD AS ZIP BUTTON (all 1-10000 JSON) -->
          <button id="download-metadata-btn" class="download-btn flex items-center gap-2 px-4 py-2 rounded-full text-white text-sm font-bold mono shadow-lg">
            <i data-lucide="archive" class="w-4 h-4"></i>
            <span>📦 ZIP (1-10000.json)</span>
          </button>
          
          <!-- Pagination -->
          <div class="flex items-center bg-[#16162a] rounded-full border border-[#ff5a5f]/30 overflow-hidden">
            <button id="prev-btn" class="px-3 py-2 hover:bg-[#ff5a5f]/20 transition text-[#ff8a8f]"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
            <div class="flex items-center gap-1 px-2 mono text-sm">
              <span class="text-gray-400">pg</span>
              <input id="page-input" type="number" min="1" max="500" value="1" class="w-12 bg-transparent text-center text-[#ff5a5f] font-bold outline-none">
              <span class="text-gray-400">/<span id="total-pages">500</span></span>
            </div>
            <button id="next-btn" class="px-3 py-2 hover:bg-[#ff5a5f]/20 transition"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
          </div>
          
          <!-- Direct ID jump -->
          <input id="search-input" type="number" placeholder="ID #" min="1" max="10000" 
                 class="w-28 bg-[#16162a] border border-[#2a2a4a] rounded-full px-4 py-2 text-sm outline-none focus:border-[#ff5a5f] transition text-white placeholder:text-gray-500 mono">
        </div>
      </div>
    </header>

    <!-- Gallery Grid -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
      <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-5"></div>
      <div id="loading" class="hidden flex flex-col items-center justify-center py-20 gap-3">
        <div class="w-10 h-10 border-3 border-[#ff5a5f]/30 border-t-[#ff5a5f] rounded-full animate-spin"></div>
        <p class="mono text-sm text-gray-400">fetching riso prints...</p>
      </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
      <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" id="modal-backdrop"></div>
      <div class="relative bg-[#12121f] rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-auto border border-white/20 modal-open">
        <div class="relative group">
          <div id="modal-img-wrapper" class="relative overflow-hidden bg-[#0a0a12] rounded-t-2xl">
            <img id="modal-img" class="w-full aspect-square object-cover" alt="NFT">
          </div>
          <button id="toggle-original" class="absolute bottom-4 right-4 z-20 image-toggle-btn rounded-full px-4 py-2 text-xs font-bold flex items-center gap-2 shadow-lg">
            <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
            <span id="toggle-text" class="mono">RISO MODE</span>
          </button>
          <button id="modal-close" class="absolute top-4 right-4 z-20 bg-black/50 backdrop-blur rounded-full p-2 hover:bg-[#ff5a5f] transition border border-white/20">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>
        
        <div class="p-5">
          <h2 id="modal-title" class="mono text-xl font-bold text-[#ff5a5f] mb-4"></h2>
          <div id="modal-traits" class="grid grid-cols-2 gap-2"></div>
          <div class="mt-4 pt-3 border-t border-white/10 text-right">
            <span class="text-[10px] text-gray-500 mono">✦ risograph spectral edition</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ======================== CONFIGURATION ========================
    const IPFS_GATEWAY = 'https://ipfs.io/ipfs/';
    const BASE_HASH = 'QmWiQE65tmpYzcokCheQmng2DCM33DEhjXcPB6PanwpAZo';
    const PER_PAGE = 20;
    const TOTAL_NFTS = 10000;          // 1 to 10000
    const TOTAL_PAGES = Math.ceil(TOTAL_NFTS / PER_PAGE);
    const CONCURRENT_LIMIT = 50;
    
    let currentPage = 1;
    let currentModalState = { isRiso: true, risoUrl: null, originalUrl: null, meta: null, id: null };
    
    // Caches
    let metadataCache = {};
    let risoCache = {};
    
    // Default config for SDK
    const defaultConfig = {
      gallery_title: 'RISOGRAPH NFT',
      subtitle_text: 'sequential archive · 1 to 10,000',
      background_color: '#0a0a12',
      accent_color: '#ff5a5f',
      surface_color: '#16162a',
      text_color: '#ffffff',
      muted_color: '#9ca3af',
      font_family: 'Inter',
      font_size: 16
    };
    
    // ======================== UTILITIES ========================
    function getMetadataUrl(id) {
      return `${IPFS_GATEWAY}${BASE_HASH}/${id}`;
    }
    
    function getImageUrl(ipfsUri) {
      if (!ipfsUri) return '';
      return ipfsUri.replace('ipfs://', IPFS_GATEWAY);
    }
    
    async function applyRisographEffect(imgSrc) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'Anonymous';
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          
          for (let i = 0; i < data.length; i += 4) {
            let r = data[i];
            let g = data[i+1];
            let b = data[i+2];
            
            let gray = r * 0.3 + g * 0.59 + b * 0.11;
            let contrast = 1.5;
            let contrasted = (gray - 128) * contrast + 128;
            contrasted = Math.min(255, Math.max(0, contrasted));
            
            let newR = contrasted * 1.15;
            let newG = contrasted * 0.85;
            let newB = contrasted * 0.9;
            
            data[i] = Math.min(255, newR);
            data[i+1] = Math.min(255, newG);
            data[i+2] = Math.min(255, newB);
          }
          
          for (let y = 0; y < canvas.height; y += 4) {
            for (let x = 0; x < canvas.width; x += 4) {
              const idx = (y * canvas.width + x) * 4;
              const brightness = (data[idx] + data[idx+1] + data[idx+2]) / 3;
              if (brightness > 120 && brightness < 220) {
                for (let dy = 0; dy < 2; dy++) {
                  for (let dx = 0; dx < 2; dx++) {
                    const px = (y + dy) * canvas.width + (x + dx);
                    const pixelIdx = px * 4;
                    if (pixelIdx < data.length) {
                      data[pixelIdx] = Math.max(0, data[pixelIdx] - 15);
                      data[pixelIdx+1] = Math.max(0, data[pixelIdx+1] - 12);
                      data[pixelIdx+2] = Math.max(0, data[pixelIdx+2] - 10);
                    }
                  }
                }
              }
            }
          }
          
          ctx.putImageData(imageData, 0, 0);
          resolve(canvas.toDataURL('image/jpeg', 0.9));
        };
        img.onerror = () => resolve(imgSrc);
        img.src = imgSrc;
      });
    }
    
    async function getRisoVersion(id, originalUrl) {
      if (risoCache[id]) return risoCache[id];
      const risoUrl = await applyRisographEffect(originalUrl);
      risoCache[id] = risoUrl;
      return risoUrl;
    }
    
    async function fetchNFT(id) {
      if (metadataCache[id]) return metadataCache[id];
      
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        
        const response = await fetch(getMetadataUrl(id), { signal: controller.signal });
        clearTimeout(timeoutId);
        
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        
        const normalized = {
          tokenId: id,
          name: data.name || `NFT #${id}`,
          image: getImageUrl(data.image || `ipfs://${BASE_HASH}/${id}.png`),
          attributes: Array.isArray(data.attributes) ? data.attributes : [],
          raw: data
        };
        
        metadataCache[id] = normalized;
        return normalized;
      } catch (err) {
        console.warn(`Failed to load NFT #${id}:`, err);
        return {
          tokenId: id,
          name: `#${id}`,
          image: `https://placehold.co/600x600/1a1a2a/ff5a5f?text=${id}`,
          attributes: [],
          raw: null,
          error: err.message
        };
      }
    }
    
    // ================ DOWNLOAD AS INDIVIDUAL JSON FILES IN ZIP (1-10000) - NO DUPLICATE ================
    async function downloadAsZip() {
      const total = TOTAL_NFTS; // 10000
      
      if (!confirm(`📦 Download ${total} individual JSON files (1.json to ${total}.json) as a ZIP archive?\n\nThis will take ~20-30 seconds. Continue?`)) {
        return;
      }
      
      // Create progress overlay
      const loadingOverlay = document.createElement('div');
      loadingOverlay.id = 'metadata-download-progress';
      loadingOverlay.className = 'fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center gap-4 backdrop-blur-md';
      loadingOverlay.innerHTML = `
        <div class="bg-[#16162a] rounded-2xl p-8 max-w-md w-full border-2 border-[#ff5a5f] shadow-2xl">
          <div class="flex items-center justify-center mb-4">
            <div class="relative">
              <div class="w-16 h-16 border-4 border-[#ff5a5f]/30 border-t-[#ff5a5f] rounded-full animate-spin"></div>
              <i data-lucide="archive" class="absolute inset-0 m-auto w-6 h-6 text-[#ff5a5f]"></i>
            </div>
          </div>
          <p class="mono text-white font-bold text-lg text-center mb-2">📦 Creating ZIP Archive</p>
          <p class="text-gray-400 text-sm text-center mb-4">Fetching ${total} NFTs and packing as individual JSON files</p>
          <div class="w-full bg-[#0a0a12] rounded-full h-3 overflow-hidden mb-3">
            <div id="dl-progress-bar" class="bg-gradient-to-r from-[#ff5a5f] to-[#ff8a8f] h-3 transition-all duration-200 ease-out" style="width: 0%"></div>
          </div>
          <div class="flex justify-between text-xs mono">
            <span id="dl-progress-current" class="text-[#ff5a5f] font-bold">0</span>
            <span class="text-gray-500">/ ${total} files</span>
            <span id="dl-speed" class="text-green-400">preparing...</span>
          </div>
          <p class="text-[10px] text-gray-600 text-center mt-4">✨ Files will be named: 1.json, 2.json, ... ${total}.json</p>
        </div>
      `;
      document.body.appendChild(loadingOverlay);
      
      setTimeout(() => {
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }, 10);
      
      const progressBar = document.getElementById('dl-progress-bar');
      const progressSpan = document.getElementById('dl-progress-current');
      const speedSpan = document.getElementById('dl-speed');
      
      let completed = 0;
      let failedIds = [];
      const startTime = Date.now();
      
      // Create ZIP instance
      const zip = new JSZip();
      
      // Process in batches with concurrency limit
      async function processBatch(ids) {
        const promises = ids.map(async (id) => {
          try {
            const meta = await fetchNFT(id);
            
            // Clean metadata object - NO DUPLICATE, only essential fields
            const cleanMetadata = {
              tokenId: meta.tokenId,
              name: meta.name,
              image: meta.image,
              attributes: meta.attributes,
              fetchedAt: new Date().toISOString()
              // ❌ rawMetadata REMOVED - no duplicate data
            };
            
            // Add to zip with filename "id.json"
            const jsonContent = JSON.stringify(cleanMetadata, null, 2);
            zip.file(`${id}.json`, jsonContent);
            
            completed++;
            if (progressSpan) progressSpan.innerText = completed;
            if (progressBar) progressBar.style.width = `${(completed / total) * 100}%`;
            
            const elapsed = (Date.now() - startTime) / 1000;
            const speed = (completed / elapsed).toFixed(1);
            if (speedSpan && elapsed > 0) {
              speedSpan.innerText = `${speed} files/sec`;
            }
          } catch (err) {
            console.error(`Failed ID ${id}:`, err);
            failedIds.push(id);
            
            // Fallback JSON - also NO DUPLICATE
            const fallbackMetadata = {
              tokenId: id,
              name: `#${id}`,
              error: err.message,
              fetchedAt: new Date().toISOString()
            };
            zip.file(`${id}.json`, JSON.stringify(fallbackMetadata, null, 2));
            
            completed++;
            if (progressSpan) progressSpan.innerText = completed;
            if (progressBar) progressBar.style.width = `${(completed / total) * 100}%`;
          }
        });
        
        await Promise.all(promises);
      }
      
      // Create batches (1..10000)
      const batchSize = CONCURRENT_LIMIT;
      const batches = [];
      for (let i = 1; i <= total; i += batchSize) {
        const batch = [];
        for (let j = i; j < Math.min(i + batchSize, total + 1); j++) {
          batch.push(j);
        }
        batches.push(batch);
      }
      
      // Execute batches sequentially
      for (let i = 0; i < batches.length; i++) {
        await processBatch(batches[i]);
      }
      
      const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
      
      // Generate ZIP file
      if (progressSpan) progressSpan.innerText = "Creating ZIP...";
      if (speedSpan) speedSpan.innerText = "packaging...";
      
      const zipBlob = await zip.generateAsync({ 
        type: "blob",
        compression: "DEFLATE",
        compressionOptions: { level: 6 }
      });
      
      // Download ZIP
      const downloadUrl = URL.createObjectURL(zipBlob);
      const a = document.createElement('a');
      a.href = downloadUrl;
      a.download = `risograph_nft_metadata_1_to_${total}_${Date.now()}.zip`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(downloadUrl);
      
      // Remove overlay
      loadingOverlay.remove();
      
      // Show success message
      if (failedIds.length > 0) {
        alert(`✅ ZIP Archive Created Successfully!\n\n📊 Stats:\n• Total files: ${total}\n• Time: ${totalTime} seconds\n• Speed: ${(total/totalTime).toFixed(1)} files/sec\n• Failed: ${failedIds.length}\n• Failed IDs: ${failedIds.slice(0, 10).join(', ')}${failedIds.length > 10 ? '...' : ''}\n\n📦 ZIP contains: ${total} JSON files (1.json to ${total}.json)\n✅ No duplicate data - each file contains clean metadata only!`);
      } else {
        alert(`✅ ZIP Archive Created Successfully!\n\n📊 Stats:\n• Total files: ${total}\n• Time: ${totalTime} seconds\n• Speed: ${(total/totalTime).toFixed(1)} files/sec\n• All files downloaded successfully!\n\n📦 ZIP contains: ${total} JSON files (1.json to ${total}.json)\n✅ No duplicate data - each file contains clean metadata only!`);
      }
    }
    
    // ======================== RENDER GRID ========================
    async function renderGrid(page) {
      const grid = document.getElementById('grid');
      const loading = document.getElementById('loading');
      
      if (!grid) return;
      
      grid.innerHTML = '';
      loading.classList.remove('hidden');
      
      const startId = (page - 1) * PER_PAGE + 1;
      const endId = Math.min(startId + PER_PAGE - 1, TOTAL_NFTS);
      const ids = [];
      for (let i = startId; i <= endId; i++) ids.push(i);
      
      let loadedCount = 0;
      
      for (let i = 0; i < ids.length; i++) {
        const id = ids[i];
        const metadata = await fetchNFT(id);
        
        if (metadata) {
          const risoPreview = await getRisoVersion(id, metadata.image);
          
          const card = document.createElement('div');
          card.className = 'card cursor-pointer animate-in';
          card.style.animationDelay = `${i * 30}ms`;
          
          card.innerHTML = `
            <div class="relative rounded-xl overflow-hidden bg-[#16162a] border border-white/10 hover:border-[#ff5a5f]/50 transition-all duration-300">
              <img 
                src="${risoPreview}" 
                alt="${metadata.name}"
                class="w-full aspect-square object-cover transition-transform duration-500 group-hover:scale-105"
                loading="lazy"
              />
              <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 via-black/50 to-transparent p-3">
                <p class="mono text-sm font-bold text-white truncate">${escapeHtml(metadata.name)}</p>
                <p class="text-[10px] text-[#ff8a8f] mono">#${id}</p>
              </div>
            </div>
          `;
          
          card.addEventListener('click', () => openModal(id, metadata));
          grid.appendChild(card);
        }
        
        loadedCount++;
        if (loadedCount === ids.length) {
          loading.classList.add('hidden');
        }
      }
    }
    
    // ======================== MODAL LOGIC ========================
    async function openModal(id, metadata) {
      const modal = document.getElementById('modal');
      const modalImg = document.getElementById('modal-img');
      const modalTitle = document.getElementById('modal-title');
      const traitsContainer = document.getElementById('modal-traits');
      const toggleText = document.getElementById('toggle-text');
      const imgWrapper = document.getElementById('modal-img-wrapper');
      
      const originalUrl = metadata.image;
      const risoUrl = await getRisoVersion(id, originalUrl);
      
      currentModalState = {
        isRiso: true,
        risoUrl: risoUrl,
        originalUrl: originalUrl,
        meta: metadata,
        id: id
      };
      
      modalImg.src = risoUrl;
      modalImg.classList.add('riso-effect');
      imgWrapper.classList.add('riso-effect');
      toggleText.innerText = 'RISO MODE';
      
      modalTitle.innerText = `${metadata.name} — #${id}`;
      
      traitsContainer.innerHTML = '';
      if (metadata.attributes && metadata.attributes.length > 0) {
        metadata.attributes.slice(0, 6).forEach(attr => {
          const traitDiv = document.createElement('div');
          traitDiv.className = 'bg-[#1e1e32] rounded-lg p-2.5 border border-white/5';
          traitDiv.innerHTML = `
            <p class="text-[9px] uppercase tracking-wider text-gray-400">${escapeHtml(attr.trait_type || 'property')}</p>
            <p class="mono text-sm font-semibold text-[#ff8a8f] truncate">${escapeHtml(attr.value || '—')}</p>
          `;
          traitsContainer.appendChild(traitDiv);
        });
      } else {
        traitsContainer.innerHTML = '<div class="col-span-2 text-center text-gray-400 text-sm">no traits available</div>';
      }
      
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }
    
    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }
    
    function toggleImageMode() {
      const modalImg = document.getElementById('modal-img');
      const toggleText = document.getElementById('toggle-text');
      const imgWrapper = document.getElementById('modal-img-wrapper');
      
      if (!currentModalState.risoUrl || !currentModalState.originalUrl) return;
      
      currentModalState.isRiso = !currentModalState.isRiso;
      
      if (currentModalState.isRiso) {
        modalImg.src = currentModalState.risoUrl;
        modalImg.classList.add('riso-effect');
        imgWrapper.classList.add('riso-effect');
        toggleText.innerText = 'RISO MODE';
      } else {
        modalImg.src = currentModalState.originalUrl;
        modalImg.classList.remove('riso-effect');
        imgWrapper.classList.remove('riso-effect');
        toggleText.innerText = 'ORIGINAL';
      }
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    // ======================== PAGINATION ========================
    function updatePage() {
      document.getElementById('page-input').value = currentPage;
      renderGrid(currentPage);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    // ======================== EVENT LISTENERS ========================
    document.getElementById('prev-btn')?.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        updatePage();
      }
    });
    
    document.getElementById('next-btn')?.addEventListener('click', () => {
      if (currentPage < TOTAL_PAGES) {
        currentPage++;
        updatePage();
      }
    });
    
    document.getElementById('page-input')?.addEventListener('change', (e) => {
      let val = parseInt(e.target.value);
      if (val >= 1 && val <= TOTAL_PAGES) {
        currentPage = val;
        updatePage();
      } else {
        e.target.value = currentPage;
      }
    });
    
    document.getElementById('search-input')?.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        const id = parseInt(e.target.value);
        if (id >= 1 && id <= TOTAL_NFTS) {
          const metadata = await fetchNFT(id);
          if (metadata) {
            await openModal(id, metadata);
          }
        } else {
          alert(`ID must be between 1 and ${TOTAL_NFTS}`);
        }
      }
    });
    
    document.getElementById('modal-close')?.addEventListener('click', closeModal);
    document.getElementById('modal-backdrop')?.addEventListener('click', closeModal);
    document.getElementById('toggle-original')?.addEventListener('click', toggleImageMode);
    document.getElementById('download-metadata-btn')?.addEventListener('click', downloadAsZip);
    
    // ======================== SDK INIT ========================
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: (config) => {
          document.getElementById('main-title').textContent = config.gallery_title || defaultConfig.gallery_title;
          document.getElementById('subtitle').textContent = config.subtitle_text || defaultConfig.subtitle_text;
          document.body.style.fontFamily = `${config.font_family || 'Inter'}, sans-serif`;
        },
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.background_color || defaultConfig.background_color, set: (v) => { document.body.style.backgroundColor = v; }},
            { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { document.documentElement.style.setProperty('--accent', v); }},
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { }},
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { }},
            { get: () => config.muted_color || defaultConfig.muted_color, set: (v) => { }}
          ],
          fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { }},
          fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { }}
        }),
        mapToEditPanelValues: (config) => new Map([
          ['gallery_title', config.gallery_title || defaultConfig.gallery_title],
          ['subtitle_text', config.subtitle_text || defaultConfig.subtitle_text]
        ])
      });
    }
    
    // ======================== INITIAL LOAD ========================
    document.getElementById('total-pages').innerText = TOTAL_PAGES;
    renderGrid(1);
    
    setTimeout(() => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }, 100);
  </script>
</body>
</html>
